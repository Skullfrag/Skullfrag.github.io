<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkullFrag</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg:#0a0a0a;
    --card:#111;
    --red:#ff2a2a;
    --text:#eaeaea;
    --muted:#888;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body {
    background:var(--bg);
    color:var(--text);
}

/* PARTICLES */
#particles {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* NAV */
nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(6px);
    border-bottom:1px solid #222;
}

.logo {
    font-size:1.5rem;
    color:var(--red);
}

.nav-links a {
    margin:0 15px;
    text-decoration:none;
    color:var(--text);
}

.nav-links a:hover {
    color:var(--red);
}

.socials a {
    margin-left:15px;
    color:var(--muted);
    font-size:1.1rem;
    transition:0.3s;
}

.socials a:hover {
    color:var(--red);
    text-shadow:0 0 10px var(--red);
}

/* HERO */
.hero {
    text-align:center;
    padding:120px 20px;
}

.hero h1 {
    font-size:3rem;
    color:var(--red);
}

.hero p {
    margin-top:15px;
    color:var(--muted);
}

/* SECTIONS */
.section {
    padding:60px 40px;
}

.section h2 {
    margin-bottom:20px;
    color:var(--red);
}

/* CARDS */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:var(--card);
    padding:20px;
    border:1px solid #222;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    border-color:var(--red);
}

/* FOOTER */
footer {
    text-align:center;
    padding:30px;
    border-top:1px solid #222;
    color:var(--muted);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
    <div class="logo">SKULLFRAG</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#mods">Mods</a>
        <a href="#live">Live</a>
    </div>

    <div class="socials">
        <a href="https://www.twitch.tv/" target="_blank"><i class="fab fa-twitch"></i></a>
        <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://kick.com" target="_blank"><i class="fa-solid fa-play"></i></a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>SKULLFRAG</h1>
    <p>Competitive Mods • Loadouts • Streams</p>
</section>

<!-- MODS -->
<section id="mods" class="section">
    <h2>Top Mods</h2>
    <div class="grid">
        <div class="card">FPS Boost Pack</div>
        <div class="card">Ultra Graphics Mod</div>
        <div class="card">Recoil Control Script</div>
    </div>
</section>

<!-- LIVE -->
<section id="live" class="section">
    <h2>Live Streams</h2>
    <div class="grid">
        <div class="card">Twitch Stream</div>
        <div class="card">Kick Stream</div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 SkullFrag</p>
    <p>Community Driven • No Piracy Hosted</p>

    <div class="socials" style="margin-top:10px;">
        <a href="https://www.twitch.tv/" target="_blank"><i class="fab fa-twitch"></i></a>
        <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://kick.com" target="_blank"><i class="fa-solid fa-play"></i></a>
    </div>
</footer>

<!-- PARTICLES SCRIPT -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255, 40, 40, 0.7)";

    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
